<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySkillfullForge v3 • ICSE Study System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: Inter, system_ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Beautiful Flip Clock */
        .flip-clock {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
        }
        .digit {
            width: 52px;
            height: 72px;
            background: #18181b;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            font-weight: 700;
            color: #fff;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.7), 0 2px 4px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        .digit.flipping {
            animation: flip 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        @keyframes flip {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(-90deg); }
            100% { transform: rotateX(0deg); }
        }
        .colon {
            font-size: 38px;
            color: #3f3f46;
            margin: 0 4px;
            font-weight: 700;
            align-self: center;
            padding-bottom: 6px;
        }
        .locked-in {
            animation: pulse 2s infinite;
        }
        .timer-locked .digit {
            border-color: #ef4444;
            box-shadow: inset 0 4px 8px rgba(239, 68, 68, 0.25);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <nav class="border-b border-white/10 bg-zinc-950/95 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-screen-xl mx-auto px-6 flex items-center justify-between h-16">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-indigo-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-graduation-cap text-white"></i>
                </div>
                <span class="font-semibold text-2xl">StudySkillfull<span class="text-indigo-400">Forge</span> v3</span>
            </div>
            <div class="flex items-center gap-x-4">
                <button onclick="showInstallModal()" class="flex items-center gap-x-2 px-4 py-2 text-sm font-semibold bg-emerald-600 hover:bg-emerald-500 rounded-3xl">
                    <i class="fa-solid fa-download"></i> <span>Download APK</span>
                </button>
                <button onclick="showAdminPanel()" class="px-4 py-2 text-sm border border-white/20 hover:bg-white/5 rounded-3xl">Admin</button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-xl mx-auto px-6 py-8">
        <div class="mb-8">
            <h1 class="text-4xl font-bold">Welcome back, <span id="welcome-name">Student</span></h1>
            <p class="text-zinc-400">Day <span id="day-streak">47</span> streak</p>
        </div>

        <!-- FLIP LOCK TIMER -->
        <div class="max-w-md mx-auto mb-10">
            <div class="glass border border-white/10 rounded-3xl p-6">
                <div class="flex items-center justify-between mb-2">
                    <div class="font-semibold flex items-center gap-x-2">
                        <i class="fa-solid fa-clock text-emerald-400"></i>
                        <span>Focus Timer</span>
                    </div>
                    <div class="text-xs px-3 py-1 bg-emerald-500/10 text-emerald-400 rounded-2xl" id="timer-status">Ready</div>
                </div>

                <!-- FLIP CLOCK -->
                <div class="py-4">
                    <div id="timer-flip" class="flip-clock">
                        <span id="d1" class="digit">2</span>
                        <span id="d2" class="digit">5</span>
                        <span class="colon">:</span>
                        <span id="d3" class="digit">0</span>
                        <span id="d4" class="digit">0</span>
                    </div>
                    <div class="text-center text-sm text-zinc-400 mt-1" id="timer-subject">Mathematics • Focus</div>
                    
                    <div id="timer-lock-badge" class="hidden mt-3 text-center">
                        <span class="inline-flex items-center gap-x-1.5 text-xs bg-red-500/10 text-red-400 px-3 py-1 rounded-2xl font-medium">
                            <i class="fa-solid fa-lock"></i> LOCKED IN
                        </span>
                    </div>
                </div>

                <div class="flex justify-center gap-x-3">
                    <button onclick="startTimer()" id="timer-start-btn"
                            class="px-7 py-2.5 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-sm font-semibold flex items-center gap-x-2">
                        <i class="fa-solid fa-play"></i> <span>Start</span>
                    </button>
                    <button onclick="pauseTimer()" id="timer-pause-btn" class="hidden px-5 py-2.5 border border-white/20 hover:bg-white/5 rounded-3xl text-sm">
                        <i class="fa-solid fa-pause"></i> <span>Pause</span>
                    </button>
                    <button onclick="endTimer()" id="timer-end-btn" class="px-5 py-2.5 border border-white/20 hover:bg-white/5 rounded-3xl text-sm">
                        End
                    </button>
                </div>
            </div>
        </div>

        <!-- Rest of the UI (simplified for clarity) -->
        <div class="text-center text-sm text-zinc-400">
            Full features (AI, Subjects, Tests, Admin) are in the complete version.<br>
            <strong>Timer is now a beautiful flip clock with LOCK IN mode.</strong>
        </div>
    </div>

    <!-- Install Modal -->
    <div id="install-modal" onclick="if (event.target.id === 'install-modal') hideInstallModal()" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-white/10 rounded-3xl max-w-sm w-full p-6">
            <div class="font-semibold text-xl mb-4">Download the App</div>
            <button onclick="downloadAPK()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-3xl font-semibold">DOWNLOAD APK</button>
            <div class="text-xs text-center mt-3 text-zinc-400">Android • Private • No ads</div>
        </div>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let timerInterval = null;
        let timerLocked = false;

        function updateTimerDisplay() {
            const min = Math.floor(timeLeft / 60);
            const sec = timeLeft % 60;
            const minStr = min.toString().padStart(2, '0');
            const secStr = sec.toString().padStart(2, '0');

            const d1 = document.getElementById('d1');
            const d2 = document.getElementById('d2');
            const d3 = document.getElementById('d3');
            const d4 = document.getElementById('d4');

            if (!d1 || !d2 || !d3 || !d4) return;

            // Flip animation for each digit
            if (d1.textContent !== minStr[0]) { d1.classList.add('flipping'); setTimeout(() => { d1.textContent = minStr[0]; d1.classList.remove('flipping'); }, 150); }
            if (d2.textContent !== minStr[1]) { d2.classList.add('flipping'); setTimeout(() => { d2.textContent = minStr[1]; d2.classList.remove('flipping'); }, 150); }
            if (d3.textContent !== secStr[0]) { d3.classList.add('flipping'); setTimeout(() => { d3.textContent = secStr[0]; d3.classList.remove('flipping'); }, 150); }
            if (d4.textContent !== secStr[1]) { d4.classList.add('flipping'); setTimeout(() => { d4.textContent = secStr[1]; d4.classList.remove('flipping'); }, 150); }
        }

        function startTimer() {
            if (timerInterval) return;

            // === FLIP LOCK ===
            timerLocked = true;
            document.getElementById('timer-lock-badge').classList.remove('hidden');
            document.getElementById('timer-lock-badge').classList.add('locked-in');

            document.getElementById('timer-start-btn').disabled = true;
            document.getElementById('timer-start-btn').classList.add('opacity-50', 'cursor-not-allowed');

            const pauseBtn = document.getElementById('timer-pause-btn');

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerLocked = false;
                    document.getElementById('timer-lock-badge').classList.add('hidden');
                    document.getElementById('timer-lock-badge').classList.remove('locked-in');
                    document.getElementById('timer-start-btn').disabled = false;
                    document.getElementById('timer-start-btn').classList.remove('opacity-50', 'cursor-not-allowed');
                    alert('Session complete! Great work.');
                    timeLeft = 25 * 60;
                    updateTimerDisplay();
                    document.getElementById('timer-status').textContent = 'Ready';
                    document.getElementById('timer-start-btn').classList.remove('hidden');
                    pauseBtn.classList.add('hidden');
                }
            }, 1000);

            document.getElementById('timer-start-btn').classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            document.getElementById('timer-status').textContent = 'LOCKED IN';
        }

        function pauseTimer() {
            if (timerLocked) {
                alert("You're locked in. Finish the session!");
                return;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timer-start-btn').classList.remove('hidden');
                document.getElementById('timer-pause-btn').classList.add('hidden');
                document.getElementById('timer-status').textContent = 'Paused';
            }
        }

        function endTimer() {
            if (timerLocked) {
                if (!confirm("You're locked in. End anyway?")) return;
            }
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = null;
            timerLocked = false;

            document.getElementById('timer-lock-badge').classList.add('hidden');
            document.getElementById('timer-lock-badge').classList.remove('locked-in');
            document.getElementById('timer-start-btn').disabled = false;
            document.getElementById('timer-start-btn').classList.remove('opacity-50', 'cursor-not-allowed');

            document.getElementById('timer-start-btn').classList.remove('hidden');
            document.getElementById('timer-pause-btn').classList.add('hidden');
            timeLeft = 25 * 60;
            updateTimerDisplay();
            document.getElementById('timer-status').textContent = 'Ready';
        }

        function startQuickSession(minutes) {
            if (timerLocked) { alert("Already locked in!"); return; }
            timeLeft = minutes * 60;
            updateTimerDisplay();
            document.getElementById('timer-status').textContent = 'Focus';
            startTimer();
        }

        function startCustomSession() {
            if (timerLocked) { alert("Already locked in!"); return; }
            const mins = prompt("Minutes:", "30");
            if (!mins) return;
            timeLeft = parseInt(mins) * 60;
            updateTimerDisplay();
            document.getElementById('timer-status').textContent = 'Focus';
            startTimer();
        }

        function showInstallModal() {
            document.getElementById('install-modal').classList.remove('hidden');
            document.getElementById('install-modal').classList.add('flex');
        }
        function hideInstallModal() {
            document.getElementById('install-modal').classList.add('hidden');
            document.getElementById('install-modal').classList.remove('flex');
        }
        function downloadAPK() {
            const a = document.createElement('a');
            a.href = 'https://raw.githubusercontent.com/Parth-Theo/studyskillfullforge-v3/main/studyskillfullforge-v3.apk';
            a.download = 'StudySkillfullForge-v3.apk';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
        function showAdminPanel() {
            alert('Full admin features available in the complete build.');
        }
        function logout() { location.reload(); }

        // Init flip clock
        window.onload = function() {
            updateTimerDisplay();
            console.log('%c[StudySkillfullForge v3] Flip Lock Timer ready', 'color:#64748b');
        };
    </script>
</body>
</html>
